spring:
  application:
    name: coiny-bot
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  messages:
    basename: messages/coin-messages
    encoding: UTF-8

discord:
  enabled: true
  token: ${DISCORD_TOKEN}

coin:
  # Single source of truth for the /balance recent-history size (FR-013).
  history:
    default-limit: 10
