spring:
  application:
    name: coiny-bot
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  messages:
    basename: messages/coin-messages,messages/queue-messages
    encoding: UTF-8

discord:
  enabled: true
  token: ${DISCORD_TOKEN}

coin:
  # Single source of truth for the /balance recent-history size (FR-013).
  history:
    default-limit: 10

# Game queue & weekly rotation (feature 004).
queue:
  rotation:
    # How often the scheduler checks whether a whole 7-day period is due (ISO-8601 duration).
    # This is the resolution of lateness, NOT a pop cadence: a due advance is applied within
    # one tick. The pop condition itself is elapsed-time-derived (now - last_pop >= 7d).
    tick: PT1H
  view:
    # How many upcoming queued games the view/announcement shows after the current game.
    next: 5
  art:
    igdb:
      enabled: true
      base-url: https://api.igdb.com/v4
      # Twitch OAuth client-credentials for IGDB cover art. Blank/absent => resolver is a
      # disabled no-op (art falls back to name-only); never committed — injected by Compose.
      client-id: ${IGDB_CLIENT_ID:}
      client-secret: ${IGDB_CLIENT_SECRET:}

# Skip jar (feature 006). Documentation of the domain defaults — GuildSkipJarConfig.defaults
# is the authoritative source (the absent-row case); per-guild rows override these.
skipjar:
  default-floor: 3        # minimum contributions to skip, regardless of majority
  default-dwell: PT24H    # 24 h a game must be current before its jar opens (stored as dwell_seconds)

# Participation earning (feature 005).
participation:
  sweep:
    # How often the background sweep samples who is currently in a designated voice channel
    # playing the current game (fixed delay, ISO-8601 duration). Crediting granularity = this tick.
    tick: PT1M
    # Gaps larger than this accrue 0 — downtime or session re-entry never credit retroactively
    # (FR-023); the tick only resets last_sampled_at in that case.
    max-gap: PT2M
