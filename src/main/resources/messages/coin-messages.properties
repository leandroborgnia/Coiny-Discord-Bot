# Coin economy i18n bundle (English defaults). Resolved via Spring MessageSource
# (spring.messages.basename=messages/coin-messages). DomainException keys + command replies.

# --- Errors (DomainException message keys) ---
coin.error.overdraw=That would overdraw <@{0,number,#}> (balance {1}). Nothing changed.
coin.error.non-positive=Amount must be a whole number of at least 1.
coin.error.not-authorized=You don''t have this server''s coin-moderator role.
coin.error.config-not-admin=Only a server administrator can configure coins.
coin.error.role-not-configured=No coin-moderator role is configured. An admin must run /coins-config first.
coin.error.invalid-cap=Cap must be 0 or greater.

# --- /coins-adjust replies ---
coin.reply.granted=🪙 Granted {0} coin(s) to <@{1,number,#}>. New balance: {2}/{3}.
coin.reply.granted.forfeited=🪙 Granted {0} coin(s) to <@{1,number,#}> ({2} forfeited over the cap). New balance: {3}/{4}.
coin.reply.deducted=🪙 Deducted {0} coin(s) from <@{1,number,#}>. New balance: {2}/{3}.
coin.reply.duplicate=Already applied — no change.

# --- /balance replies ---
coin.reply.balance.header=🪙 Your balance: {0}/{1}.
coin.reply.balance.no-history=(no recent activity)
coin.reply.history.grant=+{0} (granted by <@{1,number,#}>){2}
coin.reply.history.deduct=-{0} (deducted by <@{1,number,#}>){2}
coin.reply.history.reason= — {0}
coin.reply.history.forfeited= [{0} forfeited]

# --- /coins-config replies ---
coin.reply.config.updated=✅ Coin settings updated — moderator role: {0} · cap: {1}.
coin.reply.config.role-unset=(none)
coin.reply.config.need-arg=Provide a role and/or a cap to set.
