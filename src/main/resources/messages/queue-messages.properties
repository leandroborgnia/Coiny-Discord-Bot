# Game queue & weekly rotation i18n bundle (English defaults, feature 004). Resolved via Spring
# MessageSource (spring.messages.basename includes messages/queue-messages). DomainException keys
# + command replies. Discord user/role ids use {0,number,#} so mentions are NOT grouped with commas.

# --- Errors (DomainException message keys) ---
queue.error.no-activity=No game was recognized. You must be **playing** a game for the bot to capture it. Check that your activity/Rich Presence sharing isn''t hidden in your Discord settings, then try again. Nothing was changed.
queue.error.insufficient=You can''t afford that — your balance is {0} coin(s). Nothing changed.
queue.error.cooldown=You''re not eligible to propose yet: {0} more game(s) must be played first.
queue.error.at-top=Your game is already at the top of the queue — there''s nowhere to bump it. Just wait for it to come up.
queue.error.no-queued=You don''t have a game in the queue.
queue.error.not-authorized=You need the **Manage Server** permission to configure the queue.
queue.error.unexpected=Something went wrong handling that — nothing was charged. Please try again.

# --- /queue-propose replies ---
queue.reply.proposed=🎮 Proposed **{0}** — it''s #{1} in the queue. {2} coin(s) spent.
queue.reply.instant-pop=🎮 **{0}** is now this week''s game! (instant-pop) {1} coin(s) spent.
queue.reply.replaced=🔄 Updated your queued game to **{0}** (kept position #{1}; upvotes reset). Free.
queue.reply.duplicate=Already applied — no change.

# --- /queue-withdraw replies ---
queue.reply.withdrawn=↩️ Withdrew your queued game and refunded {0} coin(s).

# --- /queue-bump replies ---
queue.reply.bumped=⬆️ Bumped your game to #{0}. {1} coin(s) spent.

# --- /queue-view replies ---
queue.reply.view.current=▶️ This week: **{0}** (proposed by <@{1,number,#}>).
queue.reply.view.no-current=▶️ No game is set this week yet.
queue.reply.view.empty=The queue is empty — propose a game you''re playing with /queue-propose.
queue.reply.view.entry=#{0} **{1}** — <@{2,number,#}> · 👍 {3}
queue.reply.view.own-marker= ⟵ yours
queue.reply.view.eligible=You can propose a game now.
queue.reply.view.cooldown=You can propose again after {0} more game(s) are played.

# --- /queue-config replies ---
queue.reply.config.updated=✅ Queue settings updated — propose: {0} · bump: {1} · announcements: {2}.
queue.reply.config.channel-set=<#{0,number,#}>
queue.reply.config.channel-unset=(off)
queue.reply.config.need-arg=Provide a cost and/or an announcement channel to set.

# --- Weekly announcement (posted to the configured channel) ---
queue.announce.current=🎉 This week''s game: **{0}**
queue.announce.proposer=Proposed by <@{0,number,#}>
queue.announce.upnext=Up next
queue.announce.upnext.entry={0}. {1} · 👍 {2}
queue.announce.upnext.empty=(nothing queued yet)
