# Dev: Postgres 17 only. The application runs on the host for fast iteration
# (./mvnw spring-boot:run -Dspring-boot.run.profiles=dev). Dev uses its OWN volume and port and
# never shares data with the prod compose (compose.prod.yaml).
services:
  postgres:
    image: postgres:17
    container_name: coiny-postgres-dev
    environment:
      POSTGRES_DB: coiny
      POSTGRES_USER: coiny
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in your .env}
    ports:
      - "5432:5432"
    volumes:
      - coiny-pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coiny -d coiny"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  coiny-pgdata-dev:
