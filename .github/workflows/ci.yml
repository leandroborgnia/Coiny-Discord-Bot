name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # The ubuntu-latest runner has a working Docker daemon, which Testcontainers uses to start a
      # throwaway Postgres 17. No Docker-in-Docker — tests run directly on the runner.
      - name: Build and test
        run: ./mvnw -B -q verify
